{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1>Сайты</h1>
        <div class="table-responsive">
            <table class="table table-bordered table-hover" data-test="urls">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Дата добавления</th>
                    </tr>
                </thead>
                <tbody>
                    {% for url in urls %}
                    <tr>
                        <td>{{ url.id }}</td>
                        <td>
                            <a href="{{ url_for('show_url', id=url.id) }}">{{ url.name }}</a>
                        </td>
                        <td>{{ url.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
